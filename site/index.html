<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Farm Survey Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<style>

/* =========================
   GLOBAL RESET
========================= */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f7fa;
    padding: 18px;
    color: #333;
}

/* =========================
   HEADER (ENTERPRISE STYLE)
========================= */
.dashboard-header {
    background: #1f2a37;
    color: white;
    padding: 18px 22px;
    border-radius: 10px;
    margin-bottom: 18px;

    display: flex;
    flex-direction: column;
    gap: 4px;
}

.dashboard-header h1 {
    font-size: 1.4rem;
    font-weight: 600;
}

.dashboard-header small {
    opacity: 0.8;
}

/* =========================
   GRID SYSTEM (STABLE)
========================= */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;

    align-items: stretch;
}

/* =========================
   ENTERPRISE CARD
========================= */
.dashboard-card {
    background: white;
    border-radius: 10px;

    padding: 14px 14px 10px 14px;

    box-shadow: 0 3px 12px rgba(0,0,0,0.06);

    display: flex;
    flex-direction: column;

    /* 🔥 KEY FIX: prevents bleed between cards */
    min-height: 440px;
    overflow: hidden;
}

/* =========================
   CARD TITLE
========================= */
.card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1f2a37;

    margin-bottom: 8px;
    padding-bottom: 6px;

    border-bottom: 1px solid #eee;
}

/* =========================
   CHART AREA
========================= */
.chart-container {
    flex: 1;
    width: 100%;
    min-height: 340px;

    /* 🔥 prevents Plotly overflow artifacts */
    overflow: hidden;
}

/* =========================
   RESPONSIVE TWEAKS
========================= */
@media (max-width: 900px) {
    .dashboard-grid {
        grid-template-columns: 1fr;
    }

    .dashboard-card {
        min-height: 420px;
    }
}

</style>
</head>

<body>

<header class="dashboard-header">
    <h1>Farm Survey Dashboard</h1>
    <small>Enterprise Analytics View</small>
</header>

<main class="dashboard-grid" id="grid"></main>

<script>

fetch("data.json")
.then(r => r.json())
.then(data => {

    const container = document.getElementById("grid");

    if (!data.length) return;

    const cols = Object.keys(data[0]);

    cols.forEach(col => {

        const values = data.map(d => d[col]).filter(v => v !== "");

        if (values.length === 0) return;

        const card = document.createElement("div");
        card.className = "dashboard-card";

        const title = document.createElement("div");
        title.className = "card-title";
        title.innerText = col;

        const chartDiv = document.createElement("div");
        chartDiv.className = "chart-container";
        chartDiv.id = "chart_" + col.replace(/\s/g, "_");

        card.appendChild(title);
        card.appendChild(chartDiv);
        container.appendChild(card);

        // =========================
        // NUMERIC DETECTION (ROBUST)
        // =========================
        const numeric = values
            .map(v => Number(String(v).replace(/[^0-9.\-]/g, "")))
            .filter(v => !isNaN(v));

        const numericRatio = numeric.length / values.length;

        // =========================
        // BOX PLOT (ENTERPRISE STYLE)
        // =========================
        if (numericRatio > 0.6 && numeric.length > 3) {

            Plotly.newPlot(chartDiv.id, [{
                y: numeric,
                type: "box",
                marker: { color: "#4E79A7" },
                boxpoints: "outliers"
            }], {
                margin: { t: 20, b: 40, l: 60, r: 10 },
                responsive: true,
                displayModeBar: false
            });

        }

        // =========================
        // BAR CHART (ENTERPRISE STYLE)
        // =========================
        else {

            const freq = {};
            values.forEach(v => {
                freq[v] = (freq[v] || 0) + 1;
            });

            const keys = Object.keys(freq).slice(0, 12);
            const vals = keys.map(k => freq[k]);

            Plotly.newPlot(chartDiv.id, [{
                x: vals,
                y: keys,
                type: "bar",
                orientation: "h",
                marker: { color: "#1f2a37" }
            }], {

                margin: {
                    t: 20,
                    b: 40,
                    l: 180,
                    r: 10
                },

                yaxis: {
                    automargin: true
                },

                bargap: 0.35,
                responsive: true,
                displayModeBar: false
            });
        }

    });

});

</script>

</body>
</html>
