<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Farm Survey</title>

<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<style>

/* =========================
   BASE
========================= */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f7fa;
    padding: 18px;
}

/* =========================
   HEADER
========================= */
.dashboard-header {
    background: #1f2a37;
    color: white;
    padding: 18px 22px;
    border-radius: 10px;
    margin-bottom: 18px;
}

.dashboard-header h1 {
    font-size: 1.4rem;
}

/* =========================
   GRID
========================= */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
    align-items: stretch;
}

/* =========================
   CARD
========================= */
.dashboard-card {
    background: white;
    border-radius: 10px;
    padding: 14px;

    box-shadow: 0 3px 12px rgba(0,0,0,0.06);

    min-height: 440px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* =========================
   TITLE
========================= */
.card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1f2a37;
    margin-bottom: 8px;
    border-bottom: 1px solid #eee;
    padding-bottom: 6px;
}

/* =========================
   CHART
========================= */
.chart-container {
    flex: 1;
    min-height: 340px;
    width: 100%;
}

</style>
</head>

<body>

<header class="dashboard-header">
    <h1>Farmer Surveys</h1>
</header>

<main class="dashboard-grid" id="grid"></main>

<script>

fetch("data.json")
.then(r => r.json())
.then(data => {

    const container = document.getElementById("grid");

    if (!data.length) return;

    const cols = Object.keys(data[0]);

    // -----------------------------
    // METADATA FILTER
    // -----------------------------
    const ignore = [
        "id",
        "start time",
        "completion time",
        "email",
        "name",
        "privacy"
    ];

    function isIgnored(col) {
        return ignore.some(i => col.toLowerCase().includes(i));
    }

    function isNumericColumn(values) {
        const nums = values.map(v => Number(v)).filter(v => !isNaN(v));
        return nums.length / values.length > 0.7;
    }

    function splitMulti(values) {
        const freq = {};
        values.forEach(v => {
            String(v).split(";").forEach(item => {
                const k = item.trim();
                if (k) freq[k] = (freq[k] || 0) + 1;
            });
        });
        return freq;
    }

    cols.forEach(col => {

        if (isIgnored(col)) return;

        const values = data.map(d => d[col]).filter(v => v !== "" && v != null);

        if (values.length === 0) return;

        const card = document.createElement("div");
        card.className = "dashboard-card";

        const title = document.createElement("div");
        title.className = "card-title";
        title.innerText = col;

        const chartDiv = document.createElement("div");
        chartDiv.className = "chart-container";
        chartDiv.id = "chart_" + col.replace(/\s/g, "_");

        card.appendChild(title);
        card.appendChild(chartDiv);
        container.appendChild(card);

        // =========================
        // 1. NUMERIC (REAL ONLY)
        // =========================
        if (isNumericColumn(values)) {

            const nums = values.map(v => Number(v)).filter(v => !isNaN(v));

            Plotly.newPlot(chartDiv.id, [{
                y: nums,
                type: "box",
                marker: { color: "#4E79A7" },
                boxpoints: "outliers"
            }], {
                margin: { t: 20, b: 40, l: 60, r: 10 },
                displayModeBar: false
            });

            return;
        }

        // =========================
        // 2. MULTI-SELECT
        // =========================
        if (values.some(v => String(v).includes(";"))) {

            const freq = splitMulti(values);

            const keys = Object.keys(freq).slice(0, 12);
            const vals = keys.map(k => freq[k]);

            Plotly.newPlot(chartDiv.id, [{
                x: vals,
                y: keys,
                type: "bar",
                orientation: "h",
                marker: { color: "#1f2a37" }
            }], {
                margin: { t: 20, b: 40, l: 180, r: 10 },
                yaxis: { automargin: true },
                displayModeBar: false
            });

            return;
        }

        // =========================
        // 3. CATEGORICAL (DEFAULT)
        // =========================
        const freq = {};
        values.forEach(v => {
            const k = String(v).trim();
            if (k) freq[k] = (freq[k] || 0) + 1;
        });

        const keys = Object.keys(freq).slice(0, 12);
        const vals = keys.map(k => freq[k]);

        Plotly.newPlot(chartDiv.id, [{
            x: vals,
            y: keys,
            type: "bar",
            orientation: "h",
            marker: { color: "#2c3e37" }
        }], {
            margin: { t: 20, b: 40, l: 180, r: 10 },
            yaxis: { automargin: true },
            displayModeBar: false
        });

    });

});

</script>

</body>
</html>
